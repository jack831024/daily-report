<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>門市選擇 - 每日小結確認</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(135deg,#4a90d9 0%,#357abd 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;color:#1a1a1a}
.card{width:100%;max-width:480px;background:#fff;border-radius:16px;padding:2rem 1.75rem;box-shadow:0 10px 40px rgba(0,0,0,.2)}
.header{text-align:center;margin-bottom:1.5rem}
.logo-icon{font-size:40px;display:block;margin-bottom:8px}
h1{font-size:20px;font-weight:600;margin-bottom:4px}
.subtitle{font-size:13px;color:#888;margin-bottom:1.5rem;text-align:center}
.store-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.store-btn{background:#fafafa;border:2px solid #e8e8e8;border-radius:12px;padding:1rem 0.75rem;cursor:pointer;transition:all .15s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;font-family:inherit;color:inherit}
.store-btn:hover{background:#f0f7ff;border-color:#4a90d9;transform:translateY(-2px);box-shadow:0 4px 12px rgba(74,144,217,.15)}
.store-btn:active{transform:translateY(0)}
.store-btn .icon{font-size:28px;line-height:1}
.store-btn .brand{font-size:11px;color:#888;font-weight:500;letter-spacing:1px}
.store-btn .name{font-size:15px;font-weight:600;color:#1a1a1a}
.store-btn.chudian{border-color:#ffd8c9}
.store-btn.chudian:hover{background:#fff5f0;border-color:#ff8658}
.store-btn.shicheng{border-color:#c9dcff}
.store-btn.shicheng:hover{background:#f0f5ff;border-color:#4a90d9}
.footer{text-align:center;font-size:12px;color:#aaa;margin-top:1rem}
@media(max-width:380px){.store-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <span class="logo-icon">🏪</span>
    <h1>每日小結確認系統</h1>
    <p class="subtitle">請選擇門市</p>
  </div>
  <div class="store-grid">
    <button class="store-btn chudian" onclick="selectStore('chudian-zhonghe','初殿中和店')">
      <span class="icon">🍲</span>
      <span class="brand">初殿</span>
      <span class="name">中和店</span>
    </button>
    <button class="store-btn chudian" onclick="selectStore('chudian-yongchun','初殿永春店')">
      <span class="icon">🍲</span>
      <span class="brand">初殿</span>
      <span class="name">永春店</span>
    </button>
    <button class="store-btn chudian" onclick="selectStore('chudian-xinzhuang','初殿新莊店')">
      <span class="icon">🍲</span>
      <span class="brand">初殿</span>
      <span class="name">新莊店</span>
    </button>
    <button class="store-btn shicheng" onclick="selectStore('shicheng-zhongxiao','十城忠孝店')">
      <span class="icon">🏮</span>
      <span class="brand">十城</span>
      <span class="name">忠孝店</span>
    </button>
  </div>
  <p class="footer">© 內部系統 · 擇一門市後進入報表頁</p>
</div>
<script>
function selectStore(id, name){
  sessionStorage.setItem('cd_store', id);
  sessionStorage.setItem('cd_store_name', name);
  window.location.href = 'daily-summary.html';
}
</script>
</body>
</html>
